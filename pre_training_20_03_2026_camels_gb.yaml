- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "Where is gauging station “Water of Dye at Charr” located?"
    - role: assistant
      content: |
        PREFIX geo: <http://www.opengis.net/ont/geosparql#>
        PREFIX schema: <http://schema.org/>
        PREFIX sosa: <http://www.w3.org/ns/sosa/>
        PREFIX wgs84_pos: <http://www.w3.org/2003/01/geo/wgs84_pos#>

        SELECT ?name ?wkt ?lon ?lat ?elevation
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            ?sensor a sosa:Sensor ;
                    schema:name ?name ;
                    geo:hasGeometry ?geom .

            FILTER(lcase(str(?name)) = "water of dye at charr")

            ?geom geo:asWKT ?wkt .
            OPTIONAL { ?geom wgs84_pos:alt ?elevation }

            BIND(bif:st_x(?wkt) AS ?lon)
            BIND(bif:st_y(?wkt) AS ?lat)
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What are the gauging station locations of the five largest catchments by area? "
    - role: assistant
      content: |
        PREFIX hyobs: <https://w3id.org/hmontology/>
        PREFIX geo: <http://www.opengis.net/ont/geosparql#>
        PREFIX sosa: <http://www.w3.org/ns/sosa/>
        PREFIX schema: <http://schema.org/>
        PREFIX qudt: <http://qudt.org/schema/qudt/>
        PREFIX wgs84_pos: <http://www.w3.org/2003/01/geo/wgs84_pos#>
        PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

        SELECT ?sensor ?stationName ?catchment ?area ?wkt ?lon ?lat ?elevation
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            ?sensor a sosa:Sensor ;
                    hyobs:monitorsCatchment ?catchment ;
                    geo:hasGeometry ?geom .

            ?catchment hyobs:hasCatchmentArea ?areaNode .
            ?areaNode qudt:numericValue ?area .

            OPTIONAL { ?sensor schema:name ?stationName }

            ?geom geo:asWKT ?wkt .
            OPTIONAL { ?geom wgs84_pos:alt ?elevation }

            BIND(bif:st_x(?wkt) AS ?lon)
            BIND(bif:st_y(?wkt) AS ?lat)
          }
        }
        ORDER BY DESC(xsd:decimal(?area))
        LIMIT 5

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What is the boundary of Catchment 3003? [neighbouring catchments] "
    - role: assistant
      content: |
        PREFIX hyobs: <https://w3id.org/hmontology/>
        PREFIX geo:  <http://www.opengis.net/ont/geosparql#>
        PREFIX sosa: <http://www.w3.org/ns/sosa/>
        PREFIX dct:  <http://purl.org/dc/terms/>

        SELECT ?catchment ?neighborCatchment ?neighborWkt
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            ?sensor a sosa:Sensor ;
                    dct:identifier ?sensorId ;
                    hyobs:monitorsCatchment ?catchment .
            FILTER(str(?sensorId) = "3003")

            ?catchment geo:hasGeometry ?g1 .
            ?g1 geo:asWKT ?wkt1 .

            ?neighborCatchment geo:hasGeometry ?g2 .
            ?g2 geo:asWKT ?neighborWkt .

            FILTER(?neighborCatchment != ?catchment)
            FILTER(bif:st_intersects(?wkt1, ?neighborWkt, 0))
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "Which catchments share a boundary with the catchment that recorded the highest total precipitation between 2012 and 2015? "
    - role: assistant
      content: |
        PREFIX hyobs: <https://w3id.org/hmontology/>
        PREFIX geo:  <http://www.opengis.net/ont/geosparql#>
        PREFIX sosa: <http://www.w3.org/ns/sosa/>
        PREFIX qudt: <http://qudt.org/schema/qudt/>
        PREFIX xsd:  <http://www.w3.org/2001/XMLSchema#>
        PREFIX envthes: <http://vocabs.lter-europe.net/EnvThes/>

        SELECT ?topCatchment ?topTotalPrecip ?neighborCatchment
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            {
              SELECT ?topCatchment (SUM(xsd:decimal(?precVal)) AS ?topTotalPrecip)
              WHERE {
                ?sensor a sosa:Sensor ;
                        hyobs:monitorsCatchment ?topCatchment .

                ?obs a sosa:Observation ;
                    sosa:observedProperty envthes:30106 ;
                    sosa:madeBySensor ?sensor ;
                    sosa:resultTime ?t ;
                    sosa:hasResult ?res .

                ?res qudt:numericValue ?precVal .

                FILTER(?t >= "2012-01-01"^^xsd:date &&
                      ?t <  "2016-01-01"^^xsd:date)
              }
              GROUP BY ?topCatchment
              ORDER BY DESC(?topTotalPrecip)
              LIMIT 1
            }

            ?topCatchment geo:hasGeometry ?g1 .
            ?g1 geo:asWKT ?wkt1 .

            ?neighborCatchment geo:hasGeometry ?g2 .
            ?g2 geo:asWKT ?neighborWkt .

            FILTER(?neighborCatchment != ?topCatchment)
            FILTER(bif:st_intersects(?wkt1, ?neighborWkt, 0))
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What is the area of the largest catchment in the dataset? "
    - role: assistant
      content: |
        PREFIX hyobs: <https://w3id.org/hmontology/>
        PREFIX qudt:  <http://qudt.org/schema/qudt/>
        PREFIX xsd:   <http://www.w3.org/2001/XMLSchema#>

        SELECT ?catchment ?area
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            ?catchment hyobs:hasCatchmentArea ?areaNode .
            ?areaNode qudt:numericValue ?area .
          }
        }
        ORDER BY DESC(xsd:decimal(?area))
        LIMIT 1

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What are the areas of all catchments in the dataset?"
    - role: assistant
      content: |
        PREFIX hyobs: <https://w3id.org/hmontology/>
        PREFIX qudt:  <http://qudt.org/schema/qudt/>

        SELECT ?catchment ?area
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            ?catchment hyobs:hasCatchmentArea ?areaNode .
            ?areaNode qudt:numericValue ?area .
          }
        }
        ORDER BY ?catchment

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What is the distance between the gauging stations with the highest and lowest elevations in the dataset? "
    - role: assistant
      content: |
        PREFIX geo:  <http://www.opengis.net/ont/geosparql#>
        PREFIX sosa: <http://www.w3.org/ns/sosa/>
        PREFIX wgs84_pos: <http://www.w3.org/2003/01/geo/wgs84_pos#>
        PREFIX xsd:  <http://www.w3.org/2001/XMLSchema#>

        SELECT ?highestSensor ?highestEle ?lowestSensor ?lowestEle ?distance
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            {
              SELECT ?highestSensor ?highestEle ?wktHigh
              WHERE {
                ?highestSensor a sosa:Sensor ;
                              geo:hasGeometry ?gHigh .
                ?gHigh wgs84_pos:alt ?highestEle ;
                      geo:asWKT ?wktHigh .
              }
              ORDER BY DESC(xsd:decimal(?highestEle))
              LIMIT 1
            }

            {
              SELECT ?lowestSensor ?lowestEle ?wktLow
              WHERE {
                ?lowestSensor a sosa:Sensor ;
                              geo:hasGeometry ?gLow .
                ?gLow wgs84_pos:alt ?lowestEle ;
                      geo:asWKT ?wktLow .
              }
              ORDER BY xsd:decimal(?lowestEle)
              LIMIT 1
            }

            BIND(bif:st_distance(?wktHigh, ?wktLow) AS ?distance)
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What are the gauging stations within a 50 km radius of the Gauging Station nr. 1001?"
    - role: assistant
      content: |
        PREFIX geo:  <http://www.opengis.net/ont/geosparql#>
        PREFIX sosa: <http://www.w3.org/ns/sosa/>
        PREFIX dct:  <http://purl.org/dc/terms/>
        PREFIX schema: <http://schema.org/>

        SELECT ?neighborSensor ?neighborName ?distance
        WHERE {
          GRAPH <hydroturtle/camelsGb> {
            ?refSensor a sosa:Sensor ;
                      dct:identifier ?refId ;
                      geo:hasGeometry ?refGeom .
            FILTER(str(?refId) = "1001")

            ?refGeom geo:asWKT ?refWkt .

            ?neighborSensor a sosa:Sensor ;
                            geo:hasGeometry ?neighborGeom .
            ?neighborGeom geo:asWKT ?neighborWkt .

            OPTIONAL { ?neighborSensor schema:name ?neighborName }

            FILTER(?neighborSensor != ?refSensor)

            BIND(bif:st_distance(?refWkt, ?neighborWkt) AS ?distance)
            FILTER(?distance <= 50)
          }
        }
        ORDER BY ?distance

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What is name of the river connected to gauging station 'Loruens-Aeule'?"
    - role: assistant
      content: |
        PREFIX sosa:   <http://www.w3.org/ns/sosa/>
        PREFIX schema: <http://schema.org/>
        PREFIX dbo:    <http://dbpedia.org/ontology/>

        SELECT ?river
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            ?sensor a sosa:Sensor ;
                    schema:name ?stationName ;
                    dbo:river ?river .
            FILTER(lcase(str(?stationName)) = "water of dye at charr")
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "Which catchment recorded the highest mean precipitation in 2015?"
    - role: assistant
      content: |
        PREFIX sosa:   <http://www.w3.org/ns/sosa/>
        PREFIX envthes:<http://vocabs.lter-europe.net/EnvThes/>
        PREFIX qudt:   <http://qudt.org/schema/qudt/>
        PREFIX xsd:    <http://www.w3.org/2001/XMLSchema#>

        SELECT ?catchment ?meanPrecip
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            {
              SELECT ?catchment (AVG(xsd:decimal(?val)) AS ?meanPrecip)
              WHERE {
                ?obs a sosa:Observation ;
                    sosa:observedProperty envthes:30106 ;
                    sosa:hasFeatureOfInterest ?catchment ;
                    sosa:resultTime ?t ;
                    sosa:hasResult ?res .
                ?res qudt:numericValue ?val .

                FILTER(?t >= "2015-01-01"^^xsd:date &&
                      ?t <  "2016-01-01"^^xsd:date)
              }
              GROUP BY ?catchment
              ORDER BY DESC(?meanPrecip)
              LIMIT 1
            }
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "Which catchments recorded annual precipitation > 1000 mm in Great Britain in 2000?"
    - role: assistant
      content: |
        PREFIX sosa:    <http://www.w3.org/ns/sosa/>
        PREFIX envthes: <http://vocabs.lter-europe.net/EnvThes/>
        PREFIX qudt:    <http://qudt.org/schema/qudt/>
        PREFIX xsd:     <http://www.w3.org/2001/XMLSchema#>

        SELECT ?catchment ?annualPrecip
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            {
              SELECT ?catchment (SUM(xsd:decimal(?val)) AS ?annualPrecip)
              WHERE {
                ?obs a sosa:Observation ;
                    sosa:observedProperty envthes:30106 ;
                    sosa:hasFeatureOfInterest ?catchment ;
                    sosa:resultTime ?t ;
                    sosa:hasResult ?res .

                ?res qudt:numericValue ?val .

                FILTER(?t >= "2000-01-01"^^xsd:date &&
                      ?t <  "2001-01-01"^^xsd:date)
              }
              GROUP BY ?catchment
            }

            FILTER(?annualPrecip > 1000)
          }
        }
        ORDER BY DESC(?annualPrecip)

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What are the minimum and maximum precipitation observed at the Gauging Station 'wick at tarroul'? "
    - role: assistant
      content: |
        PREFIX sosa:    <http://www.w3.org/ns/sosa/>
        PREFIX envthes: <http://vocabs.lter-europe.net/EnvThes/>
        PREFIX qudt:    <http://qudt.org/schema/qudt/>
        PREFIX schema:  <http://schema.org/>
        PREFIX xsd:     <http://www.w3.org/2001/XMLSchema#>

        SELECT ?minFlow ?maxFlow
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            ?sensor a sosa:Sensor ;
                    schema:name ?stationName .
            FILTER(lcase(str(?stationName)) = "wick at tarroul")

            {
              SELECT
                (MIN(xsd:decimal(?val)) AS ?minFlow)
                (MAX(xsd:decimal(?val)) AS ?maxFlow)
              WHERE {
                ?obs a sosa:Observation ;
                    sosa:observedProperty envthes:30106 ;
                    sosa:madeBySensor ?sensor ;
                    sosa:hasResult ?res .
                ?res qudt:numericValue ?val .
              }
            }
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What are the minimum and maximum precipitation across all gauging stations? "
    - role: assistant
