- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What is the average annual precipitation in Catchment 1001 during the period from 2002 to 2005? "
    - role: assistant
      content: |
        PREFIX sosa:    <http://www.w3.org/ns/sosa/>
        PREFIX envthes: <http://vocabs.lter-europe.net/EnvThes/>
        PREFIX qudt:    <http://qudt.org/schema/qudt/>
        PREFIX xsd:     <http://www.w3.org/2001/XMLSchema#>
        PREFIX hyobs:   <https://w3id.org/hmontology/>

        SELECT ?catchment (AVG(?annualTotal) AS ?avgAnnualPrecip)
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            {
              SELECT ?catchment ?year (SUM(xsd:decimal(?val)) AS ?annualTotal)
              WHERE {
                ?obs a sosa:Observation ;
                    sosa:observedProperty envthes:30106 ;
                    sosa:hasFeatureOfInterest ?catchment ;
                    sosa:resultTime ?t ;
                    sosa:hasResult ?res .

                ?res qudt:numericValue ?val .

                FILTER(?catchment = hyobs:catchment_1001)
                BIND(YEAR(?t) AS ?year)
                FILTER(?year >= 2002 && ?year <= 2005)
              }
              GROUP BY ?catchment ?year
            }
          }
        }
        GROUP BY ?catchment

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "Which month experienced the highest precipitation rate in Great Britain in 2002?"
    - role: assistant
      content: |
        PREFIX sosa:    <http://www.w3.org/ns/sosa/>
        PREFIX envthes: <http://vocabs.lter-europe.net/EnvThes/>
        PREFIX qudt:    <http://qudt.org/schema/qudt/>
        PREFIX xsd:     <http://www.w3.org/2001/XMLSchema#>

        SELECT ?month ?meanMonthlyFlow
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            {
              SELECT ?month (AVG(xsd:decimal(?val)) AS ?meanMonthlyFlow)
              WHERE {
                ?obs a sosa:Observation ;
                    sosa:observedProperty envthes:30106;
                    sosa:resultTime ?t ;
                    sosa:hasResult ?res .

                ?res qudt:numericValue ?val .

                BIND(YEAR(?t) AS ?year)
                FILTER(?year = 2002)

                BIND(MONTH(?t) AS ?month)
              }
              GROUP BY ?month
              ORDER BY DESC(?meanMonthlyFlow)
              LIMIT 1
            }
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "Which years experienced average annual precipitation below 1200 mm/year in Great Britain? "
    - role: assistant
      content: |
        PREFIX sosa:    <http://www.w3.org/ns/sosa/>
        PREFIX envthes: <http://vocabs.lter-europe.net/EnvThes/>
        PREFIX qudt:    <http://qudt.org/schema/qudt/>
        PREFIX xsd:     <http://www.w3.org/2001/XMLSchema#>

        SELECT ?year ?avgAnnualPrecip
        WHERE {
          GRAPH <hydroturtle/lamah_ce> {
            {
              SELECT ?year (AVG(?annualTotal) AS ?avgAnnualPrecip)
              WHERE {
                {
                  SELECT ?year ?catchment (SUM(xsd:decimal(?val)) AS ?annualTotal)
                  WHERE {
                    ?obs a sosa:Observation ;
                        sosa:observedProperty envthes:30106 ;
                        sosa:hasFeatureOfInterest ?catchment ;
                        sosa:resultTime ?t ;
                        sosa:hasResult ?res .

                    ?res qudt:numericValue ?val .
                    BIND(YEAR(?t) AS ?year)
                  }
                  GROUP BY ?year ?catchment
                }
              }
              GROUP BY ?year
            }

            FILTER(?avgAnnualPrecip < 1500)
          }
        }
        ORDER BY ?year

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "How many frost days were recorded at the “brora at bruachrobie” station between 2000 and 2010? (Frost days are defined as days with temperatures below 0°C) "
    - role: assistant
      content: |
        PREFIX sosa:    <http://www.w3.org/ns/sosa/>
        PREFIX schema:  <http://schema.org/>
        PREFIX envthes: <http://vocabs.lter-europe.net/EnvThes/>
        PREFIX qudt:    <http://qudt.org/schema/qudt/>
        PREFIX xsd:     <http://www.w3.org/2001/XMLSchema#>

        SELECT (COUNT(DISTINCT ?day) AS ?frostDays)
        WHERE {
          GRAPH <hydroturtle/camelsGb> {
            ?sensor a sosa:Sensor ;
                    schema:name ?stationName .
            FILTER(lcase(str(?stationName)) = "brora at bruachrobie")


            ?obs a sosa:Observation ;
                sosa:observedProperty envthes:21524 ;
                sosa:madeBySensor ?sensor ;
                sosa:resultTime ?t ;
                sosa:hasResult ?res .

            ?res qudt:numericValue ?tempVal .

            FILTER(xsd:decimal(?tempVal) < 0)
            FILTER(?t >= "2000-01-01"^^xsd:date &&
                  ?t <  "2010-01-01"^^xsd:date)

            BIND(xsd:date(?t) AS ?day)
          }
        }















   



