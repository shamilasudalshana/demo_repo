- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What is the average annual Dissolved Organic Carbon (DOC) in Catchment 193 during 2000–2010?"
    - role: assistant
      content: |
        PREFIX hyobs: <https://w3id.org/hmontology/>
        PREFIX sosa:  <http://www.w3.org/ns/sosa/>
        PREFIX qudt:  <http://qudt.org/schema/qudt/>
        PREFIX xsd:   <http://www.w3.org/2001/XMLSchema#>

        SELECT ?catchment (AVG(?annualDOC) AS ?avgAnnualDOC)
        WHERE {
          GRAPH <hydroturtle/quadica> {
            {
              SELECT ?catchment ?year (AVG(xsd:decimal(?val)) AS ?annualDOC)
              WHERE {
                ?obs a sosa:Observation ;
                    sosa:observedProperty hyobs:SoluteConcentrationMean ;
                    hyobs:hasAnalyte hyobs:DissolvedOrganicCarbon ;
                    sosa:hasFeatureOfInterest ?catchment ;
                    sosa:resultTime ?t ;
                    sosa:hasResult ?res .

                ?res qudt:numericValue ?val .

                FILTER(?catchment = hyobs:catchment_193)
                BIND(YEAR(?t) AS ?year)
                FILTER(?year >= 2000 && ?year <= 2010)
              }
              GROUP BY ?catchment ?year
            }
          }
        }
        GROUP BY ?catchment

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "In which month did station 'BW_CEL904' experience the highest median NO₃-N in 2005?"
    - role: assistant
      content: |
        PREFIX hyobs:  <https://w3id.org/hmontology/>
        PREFIX sosa:   <http://www.w3.org/ns/sosa/>
        PREFIX schema: <http://schema.org/>
        PREFIX qudt:   <http://qudt.org/schema/qudt/>
        PREFIX xsd:    <http://www.w3.org/2001/XMLSchema#>
        PREFIX chebi:  <http://purl.obolibrary.org/obo/CHEBI_>

        SELECT ?month ?medianNO3N
        WHERE {
          GRAPH <hydroturtle/quadica> {
            {
              SELECT ?month (MAX(xsd:decimal(?val)) AS ?medianNO3N)
              WHERE {
                ?sensor a sosa:Sensor ;
                        schema:name ?stationName.
              
              FILTER(str(?stationName) = "BW_CEL904")

                ?obs a sosa:Observation ;
                    sosa:madeBySensor ?sensor ;
                    sosa:observedProperty ?prop ;
                    hyobs:hasAnalyte chebi:17632 ;
                    sosa:resultTime ?t ;
                    sosa:hasResult ?res .

                ?res qudt:numericValue ?val .

                FILTER(YEAR(?t) = 2005)
                FILTER(?prop = hyobs:NO3NConcentrationMedian || ?prop = hyobs:SoluteConcentrationMedian)

                BIND(MONTH(?t) AS ?month)
              }
              GROUP BY ?month
              ORDER BY DESC(?medianNO3N)
              LIMIT 1
            }
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "Which years experienced national median discharge below its long-term median in Germany? "
    - role: assistant
      content: |
        PREFIX hyobs: <https://w3id.org/hmontology/>
        PREFIX sosa:  <http://www.w3.org/ns/sosa/>
        PREFIX qudt:  <http://qudt.org/schema/qudt/>
        PREFIX xsd:   <http://www.w3.org/2001/XMLSchema#>

        SELECT ?year ?nationalMedianQ
        WHERE {
          GRAPH <hydroturtle/quadica> {
            {
              SELECT ?year (AVG(xsd:decimal(?val)) AS ?nationalMedianQ)
              WHERE {
                ?obs a sosa:Observation ;
                    sosa:observedProperty hyobs:DischargeMedian ;
                    sosa:resultTime ?t ;
                    sosa:hasResult ?res .
                ?res qudt:numericValue ?val .
                BIND(YEAR(?t) AS ?year)
              }
              GROUP BY ?year
            }

            {
              SELECT (AVG(xsd:decimal(?val2)) AS ?longTermMedianQ)
              WHERE {
                ?obs2 a sosa:Observation ;
                      sosa:observedProperty hyobs:DischargeMedian ;
                      sosa:hasResult ?res2 .
                ?res2 qudt:numericValue ?val2 .
              }
            }

            FILTER(?nationalMedianQ < ?longTermMedianQ)
          }
        }
        ORDER BY ?year

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "How many months in 1997 did station 'BW_CKS022' have flow-normalized NO₃-N above 11 mg/L? "
    - role: assistant
      content: |
        PREFIX hyobs:  <https://w3id.org/hmontology/>
        PREFIX sosa:   <http://www.w3.org/ns/sosa/>
        PREFIX schema: <http://schema.org/>
        PREFIX qudt:   <http://qudt.org/schema/qudt/>
        PREFIX xsd:    <http://www.w3.org/2001/XMLSchema#>
        PREFIX chebi:  <http://purl.obolibrary.org/obo/CHEBI_>

        SELECT (COUNT(DISTINCT ?month) AS ?monthsAbove11)
        WHERE {
          GRAPH <hydroturtle/quadica> {
            ?sensor a sosa:Sensor ;
                    schema:name ?stationName. 
            FILTER(lcase(str(?stationName)) = "bw_cks022")

            ?obs a sosa:Observation ;
                sosa:madeBySensor ?sensor ;
                sosa:observedProperty hyobs:SoluteConcentrationFlowNormalizedMean ;
                hyobs:hasAnalyte chebi:17632 ;
                sosa:resultTime ?t ;
                sosa:hasResult ?res .

            ?res qudt:numericValue ?val .

            FILTER(YEAR(?t) = 1997)
            FILTER(xsd:decimal(?val) > 11)

            BIND(CONCAT(STR(YEAR(?t)), "-", STR(MONTH(?t))) AS ?month)
          }
        }
















   



