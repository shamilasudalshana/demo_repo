- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "Where is gauging station “SN_OBF01800_m” located?"
    - role: assistant
      content: |
        PREFIX geo:    <http://www.opengis.net/ont/geosparql#>
        PREFIX schema: <http://schema.org/>
        PREFIX sosa:   <http://www.w3.org/ns/sosa/>

        SELECT ?name ?wkt ?lon ?lat
        WHERE {
          GRAPH <hydroturtle/quadica> {
            ?sensor a sosa:Sensor ;
                    schema:name ?name ;
                    geo:hasGeometry ?geom .

            FILTER(str(?name) = "SN_OBF01800_m")

            ?geom geo:asWKT ?wkt .

            BIND(bif:st_x(?wkt) AS ?lon)
            BIND(bif:st_y(?wkt) AS ?lat)
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What are the gauging station locations of the five largest catchments by area? "
    - role: assistant
      content: |
        PREFIX hyobs:  <https://w3id.org/hmontology/>
        PREFIX geo:    <http://www.opengis.net/ont/geosparql#>
        PREFIX sosa:   <http://www.w3.org/ns/sosa/>
        PREFIX schema: <http://schema.org/>
        PREFIX qudt:   <http://qudt.org/schema/qudt/>
        PREFIX xsd:    <http://www.w3.org/2001/XMLSchema#>

        SELECT ?sensor ?stationName ?catchment ?area ?wkt ?lon ?lat
        WHERE {
          GRAPH <hydroturtle/quadica> {
            ?sensor a sosa:Sensor ;
                    geo:hasGeometry ?geom;
                    hyobs:monitorsCatchment ?catchment .
            OPTIONAL { ?sensor schema:name ?stationName }

            ?catchment hyobs:hasCatchmentArea ?areaNode .

            ?areaNode qudt:numericValue ?area .

            ?geom geo:asWKT ?wkt .
            BIND(bif:st_x(?wkt) AS ?lon)
            BIND(bif:st_y(?wkt) AS ?lat)
          }
        }
        ORDER BY DESC(xsd:decimal(?area))
        LIMIT 5

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What is the boundary of Catchment 101? [neighbouring catchments] "
    - role: assistant
      content: |
        PREFIX hyobs: <https://w3id.org/hmontology/>
        PREFIX geo:  <http://www.opengis.net/ont/geosparql#>
        PREFIX sosa: <http://www.w3.org/ns/sosa/>
        PREFIX dct:  <http://purl.org/dc/terms/>

        SELECT ?catchment ?neighborCatchment ?neighborWkt
        WHERE {
          GRAPH <hydroturtle/quadica> {
            ?sensor a sosa:Sensor ;
                    dct:identifier ?sensorId ;
                    hyobs:monitorsCatchment ?catchment .
            FILTER(str(?sensorId) = "101")

            ?catchment geo:hasGeometry ?g1 .
            ?g1 geo:asWKT ?wkt1 .

            ?neighborCatchment geo:hasGeometry ?g2 .
            ?g2 geo:asWKT ?neighborWkt .

            FILTER(?neighborCatchment != ?catchment)
            FILTER(bif:st_intersects(?wkt1, ?neighborWkt, 0))
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "Which catchments share a boundary with the catchment that recorded the highest annual median NO₃-N in 1999? "
    - role: assistant
      content: |
        PREFIX hyobs:  <https://w3id.org/hmontology/>
        PREFIX geo:    <http://www.opengis.net/ont/geosparql#>
        PREFIX sosa:   <http://www.w3.org/ns/sosa/>
        PREFIX qudt:   <http://qudt.org/schema/qudt/>
        PREFIX xsd:    <http://www.w3.org/2001/XMLSchema#>
        PREFIX chebi:  <http://purl.obolibrary.org/obo/CHEBI_>

        SELECT ?topCatchment ?topMedian ?neighborCatchment
        WHERE {
          GRAPH <hydroturtle/quadica> {
            {
              SELECT ?topCatchment (MAX(xsd:decimal(?val)) AS ?topMedian)
              WHERE {
                ?obs a sosa:Observation ;
                    sosa:observedProperty ?prop ;
                    hyobs:hasAnalyte chebi:17632 ;
                    sosa:hasFeatureOfInterest ?topCatchment ;
                    sosa:resultTime ?t ;
                    sosa:hasResult ?res .

                ?res qudt:numericValue ?val .

                FILTER(YEAR(?t) = 1999)
                FILTER(?prop = hyobs:NO3NConcentrationMedian || ?prop = hyobs:SoluteConcentrationMedian)
              }
              GROUP BY ?topCatchment
              ORDER BY DESC(?topMedian)
              LIMIT 1
            }

            ?topCatchment geo:hasGeometry ?g1 .
            ?g1 geo:asWKT ?wkt1 .

            ?neighborCatchment geo:hasGeometry ?g2 .
            ?g2 geo:asWKT ?neighborWkt .

            FILTER(?neighborCatchment != ?topCatchment)
            FILTER(bif:st_intersects(?wkt1, ?neighborWkt, 0))
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What is the area of the largest catchment in the dataset? "
    - role: assistant
