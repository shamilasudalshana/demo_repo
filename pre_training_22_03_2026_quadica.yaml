- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "What is the distance between the stations with the highest and lowest annual median DOC in 2010? "
    - role: assistant
      content: |
        PREFIX hyobs:  <https://w3id.org/hmontology/>
        PREFIX geo:    <http://www.opengis.net/ont/geosparql#>
        PREFIX sosa:   <http://www.w3.org/ns/sosa/>
        PREFIX qudt:   <http://qudt.org/schema/qudt/>
        PREFIX xsd:    <http://www.w3.org/2001/XMLSchema#>

        SELECT ?highestSensor ?highestVal ?lowestSensor ?lowestVal ?distance
        WHERE {
          GRAPH <hydroturtle/quadica> {
            {
              SELECT ?highestSensor ?highestVal ?wktHigh
              WHERE {
                ?obs a sosa:Observation ;
                    sosa:observedProperty ?prop ;
                    hyobs:hasAnalyte hyobs:DissolvedOrganicCarbon ;
                    sosa:madeBySensor ?highestSensor ;
                    sosa:resultTime ?t ;
                    sosa:hasResult ?res .

                ?res qudt:numericValue ?highestVal .
                ?highestSensor geo:hasGeometry ?gHigh .
                ?gHigh geo:asWKT ?wktHigh .

                FILTER(YEAR(?t) = 2010)
                FILTER(?prop = hyobs:SoluteConcentrationMedian)
              }
              ORDER BY DESC(xsd:decimal(?highestVal))
              LIMIT 1
            }

            {
              SELECT ?lowestSensor ?lowestVal ?wktLow
              WHERE {
                ?obs a sosa:Observation ;
                    sosa:observedProperty ?prop ;
                    hyobs:hasAnalyte hyobs:DissolvedOrganicCarbon ;
                    sosa:madeBySensor ?lowestSensor ;
                    sosa:resultTime ?t ;
                    sosa:hasResult ?res .

                ?res qudt:numericValue ?lowestVal .
                ?lowestSensor geo:hasGeometry ?gLow .
                ?gLow geo:asWKT ?wktLow .

                FILTER(YEAR(?t) = 2010)
                FILTER(?prop = hyobs:SoluteConcentrationMedian)
              }
              ORDER BY xsd:decimal(?lowestVal)
              LIMIT 1
            }

            BIND(bif:st_distance(?wktHigh, ?wktLow) AS ?distance)
          }
        }

- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
    - role: user
      content: "Which stations lie within a 10 km radius of station “SN_OBF01800_m”?"
    - role: assistant
      content: |
        PREFIX geo:    <http://www.opengis.net/ont/geosparql#>
        PREFIX sosa:   <http://www.w3.org/ns/sosa/>
        PREFIX schema: <http://schema.org/>

        SELECT ?neighborSensor ?neighborName ?distance
        WHERE {
          GRAPH <hydroturtle/quadica> {
            ?refSensor a sosa:Sensor ;
                      schema:name "SN_OBF01800_m"^^xsd:string ;
                      geo:hasGeometry ?refGeom .
            ?refGeom geo:asWKT ?refWkt .

            ?neighborSensor a sosa:Sensor ;
                            geo:hasGeometry ?neighborGeom ;
                            schema:name ?neighborName .
            ?neighborGeom geo:asWKT ?neighborWkt .

            FILTER(?neighborSensor != ?refSensor)

            BIND(bif:st_distance(?refWkt, ?neighborWkt) AS ?distance)
            FILTER(?distance <= 10)
          }
        }
        ORDER BY ?distance
- messages:
    - role: system
      content: "Convert natural language questions into SPARQL queries for Virtuoso."
